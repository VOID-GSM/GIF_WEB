name: GIF-WAB CD

on:
  push:
    branches: ['main']

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: 소유자명 소문자 변환
        run: echo "OWNER=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Client 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/client/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/gif-client:latest

      - name: Admin 이미지 빌드 및 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/admin/Dockerfile
          push: true
          tags: ghcr.io/${{ env.OWNER }}/gif-admin:latest

      - name: 서버 배포 (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: 37670
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd ~/gif-wab
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f

      - name: GIF_WAB CD Discord Notification (success)
        if: ${{ success() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD }}
          title: '✅ GIF_WAB CD Success! ✅'
          status: ${{ job.status }}
          description: 'Client/Admin 배포 성공'
          color: 65280
          username: 'GIF-WAB-bot'

      - name: GIF_WAB CD Discord Notification (failure)
        if: ${{ failure() }}
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD }}
          title: '❗️ GIF_WAB CD Fail! ❗️'
          status: ${{ job.status }}
          description: 'Client/Admin 배포 실패'
          color: 16711680
          username: 'GIF-WAB-bot'