name: GIF-WAB CD

on:
  push:
    branches: ['main']

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH 키 설정
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p 24131 ssh.gsmsv.site >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: 서버 배포 (SSH)
        run: |
          ssh -p 24131 -i ~/.ssh/id_ed25519 ubuntu@ssh.gsmsv.site << 'EOF'
          set -e

          if [ ! -d "$HOME/GIF_WEB" ]; then
            echo "새 서버입니다. Repository 복제를 시작합니다..."
            git clone https://github.com/VOID-GSM/GIF_WEB.git "$HOME/GIF_WEB"
          fi

          cd $HOME/GIF_WEB
          git fetch origin main
          git checkout main
          git reset --hard origin/main
          
          docker compose up -d --build --remove-orphans
          docker image prune -f
          EOF
          
      - name: GIF_WAB CD Discord Notification (success)
        if: ${{ success() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD }}
          ack_no_webhook: true
          title: '✅ GIF_WAB CD Success! ✅'
          status: ${{ job.status }}
          description: 'Client/Admin 배포 성공'
          color: 65280
          username: 'GIF-WAB-bot'

      - name: GIF_WAB CD Discord Notification (failure)
        if: ${{ failure() }}
        continue-on-error: true
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD }}
          ack_no_webhook: true
          title: '❗️ GIF_WAB CD Fail! ❗️'
          status: ${{ job.status }}
          description: 'Client/Admin 배포 실패'
          color: 16711680
          username: 'GIF-WAB-bot'
